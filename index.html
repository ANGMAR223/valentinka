<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя любовь</title>
    <link rel="stylesheet" href="static/styles/style.css">
</head>
<body>

    <div>
        <h1>Привет котенок!</h1>

        <p>Хочешь что нибудь сладкое?</p>

        <button class="btn-yes" id="btnYes">Да</button>
        <button class="btn-no" id="btnNo">Нет</button>
    </div>

    <p id="message"></p>

    <script>
        
        let btnYes = document.getElementById("btnYes");
        let btnNo = document.getElementById("btnNo")
        let messageEvent = document.getElementById("message")
        
        btnYes.addEventListener("click" , function(){

            let card = document.querySelector("div");
            let cardWidth = card.clientWidth;
            let cardHeigth = card.clientHeight;

            let randomX = Math.floor(Math.random() * (cardWidth - 100)) +10;
            let randimY = Math.floor(Math.random() * (cardHeigth - 50)) + 10;

            btnYes.style.position = "absolute";
            btnYes.style.left = randomX + "px"
            btnYes.style.top = randimY + "px"
        });

            btnNo.addEventListener("click", function(){
                messageEvent.textContent = "Ну как хочешь! ❤️ Ты моя сладкая булочка! 🍩";
            })

    </script>

    
</body>
</html>
